<!DOCTYPE html>
<html>
<head>
<style>
table, th, td {
  border: 1px solid black;
  border-collapse: collapse;
}
</style>
</head>
<body>

<h2>Colgroup</h2>
<p>Add a colgroup with a col element that spans over two columns to define a style for the two columns:</p>

<table style="width:100%;">
  <colgroup>
    <col span="2" style="background-color:#D6EEEE;">
  </colgroup>
  <tr>
    <th>MON</th>
    <th>TUE</th>
    <th>WED</th>
    <th>THU</th>
    <th>FRI</th>
    <th>SAT</th>
    <th>SUN</th>
  </tr>
  <tr>
    <TD>1</TD>
    <TD>2</TD>
    <TD>3</TD>
    <TD>4</TD>
    <TD>5</TD>
    <TD>6</TD>
    <TD>7</TD>
  </tr>
  <tr>
    <TD>8</TD>
    <TD>9</TD>
    <TD>10</TD>
    <TD>11</TD>
    <TD>12</TD>
    <TD>13</TD>
    <TD>14</TD>
  </tr>
  <tr>
    <TD>15</TD>
    <TD>16</TD>
    <TD>17</TD>
    <TD>18</TD>
    <TD>19</TD>
    <TD>20</TD>
    <TD>21</TD>
  </tr>
  <tr>
    <TD>22</TD>
    <TD>23</TD>
    <TD>24</TD>
    <TD>25</TD>
    <TD>26</TD>
    <TD>27</TD>
    <TD>28</TD>
  </tr>
</table>

</body>
</html>
